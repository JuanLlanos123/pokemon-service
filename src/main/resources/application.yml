spring:
  profiles:
    active: dev
  application:
    name: pokemon-service

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/pokemon_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: pokemon
  sql:
    init:
      mode: never # Set to always if you want to run schema.sql on start instead of using ddl-auto

---

spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:pokemon_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS pokemon
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: pokemon
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: never

---

# Swagger & OpenAPI Config
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    doc-expansion: list
